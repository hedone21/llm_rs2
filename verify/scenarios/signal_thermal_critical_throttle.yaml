id: signal_thermal_critical_throttle
description: "SystemSignal path: ThermalAlert{level=critical, throttling_active=true} injected via ExternalMonitor → policy should emit Throttle / SetTargetTbt. Validates thermal → throttle strategy mapping."
layer: signal
devices: [galaxy_s25, jetson]
models: [f16, q4]
baseline:
  prompt: fixtures:short_smoke
  decode_tokens: 256
  seed: 42
  greedy: true
  backend: auto
  prefill_chunk_size: 64
action:
  enable_resilience: true
  injection_schedule:
    - delay_sec: 0.5
      signal:
        thermal_alert:
          level: critical
          temperature_mc: 90000
          throttling_active: true
          throttle_ratio: 0.5
expected:
  functional:
    engine_commands_any_of: [Throttle, SetTargetTbt]
    stderr_sequence:
      - { pattern: "\\[Resilience\\] Directive.*(Throttle|SetTargetTbt)", name: dir_received }
      - { pattern: "\\[Experiment\\] Done", after: dir_received, min_occurrences: 1 }
    heartbeat_checks: []
  crash_and_progress:
    decode_tokens_min_ratio: 0.5
  performance:
    metric: avg_tbt_ms
    delta_vs_baseline:
      min_pct: 20.0
      tolerance_pct: 30.0
  accuracy:
    min_rouge_l: 0.80
    min_bleu_4: 0.40
    min_char_similarity: 0.70
# functional_only (AB-5, 2026-06-11): llm_default policy responds to thermal
# critical with SwitchHw{cpu} + Throttle — the backend switch is an INTENTIONAL
# numeric change (CPU vs GPU matmul divergence; observed q4 ROUGE 0.297 while
# f16 happens to stay greedy-identical). Same controlled-divergence rationale
# as direct_cmd_kvquant_to_q4. Crash+progress gate still catches segfaults;
# perf/accuracy stay recorded as reference.
pass_criteria: functional_only
