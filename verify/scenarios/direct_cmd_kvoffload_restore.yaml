id: direct_cmd_kvoffload_restore
description: "KvOffload then RestoreDefaults: offloaded tokens should be recalled lossless from the SwapHandler's on-disk prefix files, producing baseline-equivalent output. Runs on both f16 and q4 weight models — the swap path operates on KV bytes and is independent of weight dtype. Q4_0 KV caches fall back to lossy prune (see swap_handler.rs header)."
layer: engine_cmd
devices: [galaxy_s25, jetson]
models: [f16, q4]
baseline:
  prompt: fixtures:short_smoke
  decode_tokens: 96
  seed: 42
  greedy: true
  backend: auto
  prefill_chunk_size: 64
  extra_args:
    - "--swap-dir"
    - "/data/local/tmp/llm_rs2_swap"
action:
  enable_resilience: true
  mock_manager_commands:
    - delay_sec: 0.5
      command: KvOffload
      params: { ratio: 0.5 }
    - delay_sec: 2.5
      command: RestoreDefaults
      params: {}
expected:
  functional:
    engine_commands_any_of: [KvOffload, RestoreDefaults]
    stderr_sequence:
      - { pattern: "\\[Resilience\\] KvOffload: ratio=", name: offloaded }
      - { pattern: "\\[Resilience\\] Recalled .* tokens from swap", name: recalled, after: offloaded, min_occurrences: 1 }
      - { pattern: "\\[Experiment\\] Done", after: recalled, min_occurrences: 1 }
    heartbeat_checks: []
  crash_and_progress:
    decode_tokens_min_ratio: 0.5
  performance:
    metric: avg_tbt_ms
    delta_vs_baseline:
      max_pct: 300.0
      tolerance_pct: 100.0
  accuracy:
    # Offload happens DURING decode: tokens generated while the prefix is
    # offloaded use reduced attention context (missing older tokens). Recall
    # restores the bytes but cannot undo already-emitted tokens. Accept
    # modest divergence — the test's real purpose (forward + recall wire
    # correctness) is covered by stderr_sequence.
    min_rouge_l: 0.30
    min_bleu_4: 0.10
    min_char_similarity: 0.35
pass_criteria: functional_only  # lossy-by-design; crash/progress gate still enforced
