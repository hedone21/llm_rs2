id: direct_cmd_kvoffload
description: "Direct KvOffload directive with ratio 0.5. Validates wire + engine dispatch end-to-end (Manager → Engine) and that the disk-backed SwapHandler writes the LRU prefix out. Accuracy intentionally degraded without recall, so only functional + crash+progress gates apply."
layer: engine_cmd
devices: [galaxy_s25, jetson]
models: [f16, q4]
baseline:
  prompt: fixtures:short_smoke
  decode_tokens: 96
  seed: 42
  greedy: true
  backend: auto
  prefill_chunk_size: 64
  extra_args:
    - "--swap-dir"
    - "/data/local/tmp/llm_rs2_swap"
action:
  enable_resilience: true
  mock_manager_command: KvOffload
  mock_manager_params:
    ratio: 0.5
    wait_secs: 2
expected:
  functional:
    engine_commands_any_of: [KvOffload]
    stderr_sequence:
      - { pattern: "\\[Resilience\\] Directive.*KvOffload", name: dir_received }
      - { pattern: "\\[Resilience\\] KvOffload: ratio=", name: offloaded, after: dir_received, min_occurrences: 1 }
      - { pattern: "\\[Experiment\\] Done", after: offloaded, min_occurrences: 1 }
    heartbeat_checks: []
  crash_and_progress:
    decode_tokens_min_ratio: 0.5
  performance:
    metric: avg_tbt_ms
    delta_vs_baseline:
      max_pct: 300.0
      tolerance_pct: 100.0
# functional_only: KvOffload without a paired RestoreDefaults drops tokens permanently
# (in this harness: the in-memory SwapState is attached to the process, no recall occurs),
# so the model response is expected to diverge from baseline. The gate here is "directive
# was received, the offload ran, and the engine kept making progress".
pass_criteria: functional_only
