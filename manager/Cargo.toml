[package]
name = "llm_manager"
version = "0.1.0"
edition = "2024"

[dependencies]
llm_shared = { path = "../shared" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
zbus = { version = "5", default-features = false, features = ["blocking-api", "async-io"] }

[[bin]]
name = "mock_manager"
path = "src/bin/mock_manager.rs"
